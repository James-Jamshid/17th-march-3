<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style for third form.css">
</head>
<body>
    <div class="title"> Send Us Note  </div>
    <div class="container">
        <form action="#">
            <div class="box">
                <div class="inner-box">
                    <span class="details"> Your Name</span> <br>
                    <input class="inner-input" type="text" placeholder="Your Name">

                </div>
                <div class="inner-box">
                    <span class="details"> Your Email Adress</span> <br>
                    <input class="inner-input" type="text" placeholder="Your Email Adress">

                </div>
                <div class="inner-box">
                    <span class="details"> Message</span> <br>
                    <input  class="message" type="text" placeholder=" ">

                </div>
                <div class="button">
                    <input  class="inner-button" type="submit" value="Send message">
    
                </div>

            </div>
        </form>

    </div>
    
    
</body>
</html>
